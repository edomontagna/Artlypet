<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artlypet — AI Pet Portraits</title>
    <meta name="description" content="Transform your pet's photo into stunning AI-generated art portraits. Choose from 12+ art styles. Free to start." />
    <meta name="author" content="Artlypet" />

    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Open Graph -->
    <meta property="og:title" content="Artlypet — AI Pet Portraits" />
    <meta property="og:description" content="Transform your pet into a masterpiece. 12+ art styles, museum-quality prints." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://artlypet.com" />
    <meta property="og:site_name" content="Artlypet" />
    <meta property="og:image" content="https://artlypet.com/images/og-cover.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ArtlypetAI" />
    <meta name="twitter:title" content="Artlypet — AI Pet Portraits" />
    <meta name="twitter:description" content="Transform your pet photos into stunning AI-generated artistic portraits." />
    <meta name="twitter:image" content="https://artlypet.com/images/og-cover.webp" />

    <link rel="canonical" href="https://artlypet.com" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Artlypet",
      "url": "https://artlypet.com",
      "description": "AI-powered luxury pet portrait generator"
    }
    </script>

    <!-- Structured Data: Product -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "Artlypet AI Pet Portraits",
      "description": "Transform your pet photos into stunning AI-generated artistic portraits",
      "offers": {
        "@type": "AggregateOffer",
        "lowPrice": "0",
        "highPrice": "15.00",
        "priceCurrency": "EUR"
      }
    }
    </script>

    <!-- Structured Data: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Artlypet",
      "description": "Transform your pet's photo into stunning AI-generated art portraits. Choose from 12+ art styles.",
      "url": "https://artlypet.com",
      "applicationCategory": "MultimediaApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR",
        "description": "3 free portraits on signup"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "10000",
        "bestRating": "5"
      }
    }
    </script>

    <link rel="preload" href="/images/renaissance.webp" as="image" type="image/webp">

    <!-- Analytics initialized in React via useAnalytics hook -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
