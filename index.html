<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artlypet — Museum-quality AI portraits of your pet, in 60 seconds</title>
    <meta name="description" content="Upload a photo, pick one of 12 hand-tuned painting styles, get a high-resolution portrait of your pet ready to print on canvas. 3 free portraits on signup, no card required." />
    <meta name="author" content="Artlypet" />

    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Favicon -->
    <link rel="icon" href="/icons/logo.jpg" type="image/jpeg" />
    <link rel="apple-touch-icon" href="/icons/logo.jpg" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#5a7a5a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Open Graph -->
    <meta property="og:title" content="Artlypet — AI Pet Portraits" />
    <meta property="og:description" content="Transform your pet into a masterpiece. 12+ art styles, museum-quality prints." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://artlypet.com" />
    <meta property="og:site_name" content="Artlypet" />
    <meta property="og:image" content="https://artlypet.com/images/og-cover.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ArtlypetAI" />
    <meta name="twitter:title" content="Artlypet — AI Pet Portraits" />
    <meta name="twitter:description" content="Transform your pet photos into stunning AI-generated artistic portraits." />
    <meta name="twitter:image" content="https://artlypet.com/images/og-cover.webp" />

    <!-- Canonical URL managed dynamically by SEOHead component -->

    <!-- Font preconnect & loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <!-- Display: Playfair (editorial/landing only). Body+UI: Cabinet Grotesk (Fontshare). Numerals: JetBrains Mono. -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@300,400,500,700,800&display=swap" />

    <!-- Supabase preconnect -->
    <link rel="preconnect" href="https://kulqdwkmsaptdzerbwqt.supabase.co" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Artlypet",
      "url": "https://artlypet.com",
      "description": "AI-powered luxury pet portrait generator"
    }
    </script>

    <!-- Structured Data: Product (AggregateOffer reflects real freemium pricing range) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "Artlypet AI Pet Portrait",
      "description": "AI-generated artistic portrait of a pet, in 12 hand-tuned painting styles, ready in under 60 seconds. Optional canvas print fulfilment across the EU.",
      "brand": { "@type": "Brand", "name": "Artlypet" },
      "offers": {
        "@type": "AggregateOffer",
        "lowPrice": "4.99",
        "highPrice": "79.90",
        "priceCurrency": "EUR",
        "offerCount": "5"
      }
    }
    </script>

    <!-- Structured Data: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Artlypet",
      "description": "AI pet portrait generator with 12 painting styles and optional canvas print fulfilment.",
      "url": "https://artlypet.com",
      "applicationCategory": "MultimediaApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR",
        "description": "Free signup includes 3 watermarked portraits, no card required"
      }
    }
    </script>

    <link rel="preload" href="/images/renaissance.webp" as="image" type="image/webp">

    <!-- Analytics initialized in React via useAnalytics hook -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
